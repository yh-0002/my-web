<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart-Reserve 智慧預約</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f0f2f5;
    }

    header {
      background: #007BFF;
      color: white;
      padding: 16px;
      text-align: center;
      font-size: 20px;
    }

    .container {
      padding: 16px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    h2 {
      margin-top: 0;
    }

    .service {
      padding: 12px;
      margin: 8px 0;
      background: #f5f5f5;
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
    }

    .service.active {
      background: #007BFF;
      color: white;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      margin-bottom: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
    }

    .hidden {
      display: none;
    }

    .success {
      text-align: center;
      padding: 40px;
    }

    .time-slot {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .time {
      flex: 1 1 30%;
      padding: 10px;
      text-align: center;
      background: #eee;
      border-radius: 8px;
      cursor: pointer;
    }

    .time.active {
      background: #28a745;
      color: white;
    }
  </style>
</head>

<body>

<header>Smart-Reserve 預約系統</header>

<div class="container">

  <!-- Step 1: 選服務 -->
  <div class="card" id="step1">
    <h2>選擇服務</h2>
    <div class="service" onclick="selectService(this)">餐廳訂位</div>

  </div>

  <!-- Step 2: 填資料 -->
  <div class="card hidden" id="step2">
    <h2>填寫資料</h2>
    <input type="text" id="name" placeholder="您的姓名">
    <input type="tel" id="phone" placeholder="電話">
    <input type="date" id="date">
  </div>

  <!-- Step 3: 選時間 -->
  <div class="card hidden" id="step3">
    <h2>選擇時段</h2>
    <div class="time-slot">
      <div class="time" onclick="selectTime(this)">10:00</div>
      <div class="time" onclick="selectTime(this)">11:00</div>
      <div class="time" onclick="selectTime(this)">13:00</div>
      <div class="time" onclick="selectTime(this)">14:00</div>
      <div class="time" onclick="selectTime(this)">15:00</div>
    </div>
  </div>

  <!-- Submit -->
  <button onclick="submitBooking()">確認訂位</button>

  <!-- Success -->
  <div class="card success hidden" id="success">
    <h2>🎉 訂位成功</h2>
    <p id="result"></p>
  </div>

</div>

<script>
  let selectedService = "";
  let selectedTime = "";

  function selectService(el) {
    document.querySelectorAll('.service').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
    selectedService = el.innerText;

    document.getElementById('step2').classList.remove('hidden');
  }

  function selectTime(el) {
    document.querySelectorAll('.time').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    selectedTime = el.innerText;

    document.getElementById('step3').classList.remove('hidden');
  }

  function submitBooking() {
    let name = document.getElementById('name').value;
    let phone = document.getElementById('phone').value;
    let date = document.getElementById('date').value;

    if (!selectedService || !selectedTime || !name || !phone || !date) {
      alert("請完整填寫資料");
      return;
    }

    let resultText = `
      姓名：${name}<br>
      服務：${selectedService}<br>
      日期：${date}<br>
      時間：${selectedTime}
    `;

    document.getElementById('result').innerHTML = resultText;
    document.getElementById('success').classList.remove('hidden');
  }
</script>

</body>
</html>
