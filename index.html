<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart-Reserve</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>Smart-Reserve 預約系統</header>

<div class="container">

  <!-- Step 1 -->
  <div class="card">
    <h2>Step 1：選擇服務</h2>

    <div class="service" onclick="selectService(this)">
      FTA WT 餐廳訂位
    </div>
  </div>

  <!-- Step 2 -->
  <div class="card">
    <h2>Step 2：填寫資料</h2>

    <input type="text" id="name" placeholder="您的姓名">
    <input type="tel" id="phone" placeholder="電話">
    <input type="date" id="date">

    <select id="people">
      <option value="">用餐人數</option>
      <option>1 人</option>
      <option>2 人</option>
      <option>3 人</option>
      <option>4 人</option>
    </select>

    <button onclick="goToStep3()">下一步：選時段</button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
