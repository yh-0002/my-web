<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>選擇時段</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>Smart-Reserve 預約系統</header>

<div class="container">

  <div class="card">
    <h2>Step 3：選擇時段</h2>

    <div class="time-slot">
      <div class="time" onclick="selectTime(this)">11:00</div>
      <div class="time" onclick="selectTime(this)">12:00</div>
      <div class="time" onclick="selectTime(this)">13:00</div>
      <div class="time" onclick="selectTime(this)">14:00</div>
      <div class="time" onclick="selectTime(this)">15:00</div>
      <div class="time" onclick="selectTime(this)">16:00</div>
      <div class="time" onclick="selectTime(this)">17:00</div>
      <div class="time" onclick="selectTime(this)">18:00</div>
      <div class="time" onclick="selectTime(this)">19:00</div>
      <div class="time" onclick="selectTime(this)">20:00</div>
      <div class="time" onclick="selectTime(this)">21:00</div>
    </div>

    <button onclick="submitBooking()">確認訂位</button>
  </div>

</div>

<script>
let selectedTime = "";

/* 選時段 */
function selectTime(el) {
  document.querySelectorAll('.time').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  selectedTime = el.innerText;
}

/* 提交 */
function submitBooking() {
  const temp = JSON.parse(localStorage.getItem("tempBooking"));

  if (!temp) {
    alert("資料遺失，請重新填寫");
    window.location.href = "index.html";
    return;
  }

  if (!selectedTime) {
    alert("請選擇時段");
    return;
  }

  const finalData = {
    ...temp,
    time: selectedTime
  };

  localStorage.setItem("booking", JSON.stringify(finalData));
  localStorage.removeItem("tempBooking");

  window.location.href = "success.html";
}
</script>

</body>
</html>
