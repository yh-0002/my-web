<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訂位成功</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>Smart-Reserve</header>

<div class="container">

  <div class="card success">
    <h2>🎉 訂位成功</h2>
    <p>我們已收到您的預約</p>

    <div id="result"></div>

    <br>

    <button onclick="location.href='index.html'">
      返回首頁
    </button>
  </div>

</div>

<script>
  const raw = localStorage.getItem("booking");

  if (!raw) {
    document.getElementById("result").innerHTML = "<p>查無訂位資料</p>";
  } else {
    const data = JSON.parse(raw);

    document.getElementById("result").innerHTML = `
      <div class="info">
        <div>📌 訂位編號：${data.id}</div>
        <div>👤 姓名：${data.name}</div>
        <div>📞 電話：${data.phone}</div>
        <div>🍽️ 服務：${data.service}</div>
        <div>👥 人數：${data.people}</div>
        <div>📅 日期：${data.date}</div>
        <div>⏰ 時間：${data.time}</div>
      </div>
    `;
  }
</script>

</body>
</html>
